<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=landing.html">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris AI | Architectural Digital Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface-container-lowest: #010e24;
            --background: #041329;
            --primary: #b4c5ff;
            --on-surface: #d6e3ff;
            --on-surface-variant: #c5c6cd;
            --outline-variant: #44474d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--background);
            color: var(--on-surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .loader {
            text-align: center;
        }
        
        .loader-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .loader-text {
            color: var(--on-surface-variant);
            font-size: 0.875rem;
        }
        
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--outline-variant);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="loader-logo">Aetheris AI</div>
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading...</div>
    </div>
</body>
</html>
