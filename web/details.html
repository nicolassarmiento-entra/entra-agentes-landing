<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Details | Aetheris AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="bg-background text-on-surface selection:bg-primary selection:text-on-primary architechtural-grid">

    <!-- Navbar -->
    <nav class="navbar">
        <a href="landing.html" class="navbar-logo">Aetheris AI</a>
        <div class="navbar-links" id="nav-links">
            <a href="landing.html" class="navbar-link">Solutions</a>
            <a href="catalog.html" class="navbar-link active">Agents</a>
            <a href="#" class="navbar-link">Case Studies</a>
            <a href="contact.html" class="navbar-link">Pricing</a>
            <a href="admin.html" class="navbar-link">Admin Panel</a>
        </div>
        <div class="navbar-right">
            <a href="favorites.html" class="navbar-link" title="Favorites" style="position: relative;">
                <span class="material-symbols-outlined">favorite</span>
                <span id="fav-count-badge" style="position: absolute; top: -8px; right: -8px; background: var(--primary); color: var(--on-primary); font-size: 0.625rem; font-weight: 700; padding: 0.125rem 0.375rem; border-radius: 9999px; display: none;">0</span>
            </a>
            <a href="contact.html" class="btn btn-primary btn-sm">Get Started</a>
        </div>
    </nav>

    <main class="pt-24 pb-12 min-h-screen flex flex-col items-center px-6">
        <!-- Breadcrumb -->
        <div class="w-full max-w-7xl px-8 mb-8">
            <span class="breadcrumb uppercase tracking-[0.05em] font-bold text-primary" id="breadcrumb">Agent Directory</span>
        </div>
        
        <!-- Content -->
        <div class="w-full max-w-7xl px-8 grid grid-cols-1 lg:grid-cols-12 gap-12 items-start" id="details-content">
            <!-- Content generated by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-logo">Aetheris AI</div>
        <div class="footer-copyright">© 2024 Aetheris AI Digital. Architectural Precision.</div>
        <div class="footer-links">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Security</a>
            <a href="#" class="footer-link">Status</a>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script>
        // Get service ID from URL
        function getServiceIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || 'viral-reels-creator';
        }
        
        // Render details
        function renderDetails() {
            const serviceId = getServiceIdFromUrl();
            const service = getServiceById(serviceId);
            
            if (!service) {
                document.getElementById('details-content').innerHTML = '<div class="empty-state"><span class="material-symbols-outlined">error</span><h3>Service not found</h3></div>';
                return;
            }
            
            const breadcrumb = document.getElementById('breadcrumb');
            breadcrumb.textContent = `Agent Directory / ${service.category}`;
            
            const isFavorite = Storage.isFavorite(service.id);
            const content = document.getElementById('details-content');
            
            content.innerHTML = `
                <!-- Info Area (Left) -->
                <div class="lg:col-span-5 flex flex-col gap-8">
                    <div class="flex flex-col gap-4">
                        <h1 class="text-5xl font-extrabold tracking-[-0.02em] text-on-surface leading-tight">${service.name}</h1>
                        <p class="text-lg text-on-surface-variant leading-relaxed">
                            ${service.fullDescription}
                        </p>
                    </div>
                    
                    <!-- Deliverables List -->
                    <div class="glass-card">
                        <h3 class="text-xs uppercase tracking-widest font-bold text-primary">Standard Deliverables</h3>
                        <ul class="deliverables-list" style="margin-top: 1.5rem;">
                            ${service.deliverables.map(item => `
                                <li class="deliverable-item">
                                    <span class="material-symbols-outlined text-primary">check_circle</span>
                                    <span>${item}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    
                    <!-- CTAs -->
                    <div class="flex flex-col sm:flex-row gap-4 pt-4">
                        <a href="contact.html" class="btn btn-primary" style="flex: 1; justify-content: center;">
                            <span class="material-symbols-outlined">rocket_launch</span>
                            Request Campaign
                        </a>
                        <button class="btn btn-secondary" onclick="toggleFavorite('${service.id}')" style="flex: none;">
                            <span class="material-symbols-outlined" ${isFavorite ? 'style="font-variation-settings: \'FILL\' 1;"' : ''}>favorite</span>
                            ${isFavorite ? 'Saved' : 'Save to Favorites'}
                        </button>
                    </div>
                    
                    <!-- Testimonial -->
                    <div class="p-4 border-l-2 border-primary bg-surface-container-low italic text-on-surface-variant text-sm rounded">
                        "${service.testimonial}"
                    </div>
                </div>
                
                <!-- Visual Area / Workflow (Right) -->
                <div class="lg:col-span-7 h-full">
                    <div class="glass-card" style="padding: 3rem; min-height: 500px; position: relative;">
                        ${service.steps.map((step, index) => `
                            <div style="text-align: center; position: relative;">
                                <div class="flowchart-step ${index === 1 ? 'active' : ''}" style="max-width: 20rem; margin: 0 auto; display: inline-flex; align-items: center; gap: 1rem;">
                                    <div style="width: 3rem; height: 3rem; background: ${index === 1 ? 'var(--primary)' : 'rgba(180, 197, 255, 0.1)'}; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; border: 1px solid ${index === 1 ? 'var(--primary)' : 'rgba(180, 197, 255, 0.2)'};">
                                        <span class="material-symbols-outlined" style="color: ${index === 1 ? 'var(--on-primary)' : 'var(--primary)'}">${step.icon}</span>
                                    </div>
                                    <div style="text-align: left;">
                                        <span class="text-xs uppercase tracking-widest font-bold" style="display: block; color: var(--primary);">Step ${step.step}</span>
                                        <span style="font-weight: 700; color: #fff;">${step.title}</span>
                                    </div>
                                </div>
                                ${index < 2 ? `
                                <div class="flowchart-connector">
                                    <div></div>
                                </div>
                                ` : ''}
                            </div>
                        `).join('')}
                        
                        <!-- Blueprint Overlay -->
                        <div class="blueprint-overlay"></div>
                        
                        <!-- Glow Effects -->
                        <div class="glow-primary" style="top: 2.5rem; right: 2.5rem;"></div>
                        <div class="glow-primary" style="bottom: 2.5rem; left: 2.5rem; background: #0053db;"></div>
                    </div>
                </div>
            `;
        }
        
        // Toggle favorite
        function toggleFavorite(serviceId) {
            Storage.toggleFavorite(serviceId);
            updateFavoriteBadge();
            renderDetails();
        }
        window.toggleFavorite = toggleFavorite;

        // Update favorite badge
        function updateFavoriteBadge() {
            const favorites = Storage.getFavorites();
            const badge = document.getElementById('fav-count-badge');
            if (badge) {
                if (favorites.length > 0) {
                    badge.textContent = favorites.length;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderDetails();
            updateFavoriteBadge();
        });
    </script>
</body>
</html>
